server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: budget-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/budgets/**
        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/transactions/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "http://localhost:5173"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - Authorization
              - Content-Type
            allow-credentials: true
